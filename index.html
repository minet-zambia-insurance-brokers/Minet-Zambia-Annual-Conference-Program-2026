<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Minet Pension Conference Program Download</title>

	<style>
		@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Source+Sans+3:wght@400;600&display=swap');

		:root {
			--brand-red: #c10000;
			--brand-red-dark: #970000;
			--ink: #1a1a1a;
			--muted: #545454;
			--surface: #fffdf9;
			--line: #f2d8d8;
			--gold: #e7b75f;
			--program-pdf-url: https://github.com/minet-zambia-insurance-brokers/Minet-Zambia-2026-Program-/releases/latest/download/Minet.Zambia.Annual.Pension.Conference.-Program.2026.pdf
;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			color: var(--ink);
			font-family: 'Source Sans 3', 'Trebuchet MS', sans-serif;
			background:
				radial-gradient(circle at 10% 12%, rgba(193, 0, 0, 0.12), transparent 35%),
				radial-gradient(circle at 90% 88%, rgba(231, 183, 95, 0.22), transparent 30%),
				linear-gradient(150deg, #fff, #fff7f7 45%, #fffef7);
		}

		.card {
			width: 100%;
			max-width: 680px;
			border: 1px solid var(--line);
			border-radius: 22px;
			background: var(--surface);
			box-shadow: 0 18px 45px rgba(0, 0, 0, 0.09);
			overflow: hidden;
			animation: rise 700ms ease-out;
		}

		.banner {
			padding: 18px 20px;
			background: linear-gradient(110deg, var(--brand-red), var(--brand-red-dark));
			color: #fff;
			text-align: center;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			font-weight: 700;
			font-family: 'Montserrat', 'Verdana', sans-serif;
			font-size: 0.86rem;
		}

		.content {
			padding: clamp(22px, 4vw, 42px);
			text-align: center;
		}

		.brand-logo {
			width: clamp(78px, 16vw, 110px);
			height: auto;
			margin-bottom: 14px;
		}

		h1 {
			margin: 0;
			color: var(--brand-red);
			font-family: 'Montserrat', 'Verdana', sans-serif;
			font-weight: 800;
			font-size: clamp(1.3rem, 2.7vw, 2rem);
			line-height: 1.22;
			text-wrap: balance;
		}

		.venue,
		.date {
			margin: 10px 0 0;
			font-size: clamp(1rem, 2vw, 1.1rem);
			color: var(--muted);
			font-weight: 600;
		}

		.date {
			color: #3d2f2f;
		}

		.divider {
			width: min(230px, 65%);
			height: 2px;
			margin: 20px auto;
			border: 0;
			background: linear-gradient(90deg, transparent, var(--gold), transparent);
		}

		p {
			margin: 0 0 20px;
			color: #373737;
			font-size: clamp(0.98rem, 1.9vw, 1.08rem);
			line-height: 1.55;
		}

		.download-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
			margin-top: 4px;
			background: linear-gradient(130deg, var(--brand-red), #db1212);
			color: #fff;
			text-decoration: none;
			padding: 13px 20px;
			border-radius: 12px;
			font-weight: 700;
			letter-spacing: 0.02em;
			transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
			box-shadow: 0 9px 18px rgba(193, 0, 0, 0.24);
		}

		.download-btn:hover,
		.download-btn:focus-visible {
			transform: translateY(-2px);
			box-shadow: 0 14px 26px rgba(193, 0, 0, 0.3);
			filter: saturate(1.08);
		}

		.hint {
			margin-top: 14px;
			font-size: 0.9rem;
			color: #666;
		}

		@keyframes rise {
			from {
				opacity: 0;
				transform: translateY(12px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 420px) {
			.banner {
				font-size: 0.76rem;
			}

			.download-btn {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<main class="card">
		<div class="banner">Program Document</div>

		<section class="content">
			<img
				class="brand-logo"
				src="https://minet-zambia-insurance-brokers.github.io/supplier-registration-form/Minet%20Emblem.png"
				alt="Minet Logo"
				loading="lazy"
			>

			<h1>Minet Zambia Annual Pension Conference</h1>
			<p class="venue">Radisson Blu, Livingstone</p>
			<p class="date">11th June 2026 to 12th June 2026</p>

			<hr class="divider">

			<p>
				Click the button below to download the official conference program document.
			</p>

			<a
				class="download-btn"
				href="https://github.com/minet-zambia-insurance-brokers/Minet-Zambia-2026-Program-/releases/latest/download/Minet.Zambia.Annual.Pension.Conference.-Program.2026.pdf"
				download
				aria-label="Download 3rd Annual Minet Pension Conference program PDF"
			>
				Download Program PDF
			</a>

			<p class="hint">
				The PDF is hosted in the GitHub release as 2026.Minet.Zambia.Program.pdf
			</p>
		</section>
	</main>

	<script>
		window.addEventListener('load', function () {
			var downloadLink = document.querySelector('.download-btn');
			if (!downloadLink) {
				return;
			}

			var releaseUrl = document.documentElement.style.getPropertyValue('--program-pdf-url').trim();
			if (releaseUrl) {
				downloadLink.href = releaseUrl;
			}

			// Auto-trigger download for users arriving via QR code or direct page open.
			setTimeout(function () {
				downloadLink.click();
			}, 400);
		});
	</script>
</body>
</html>
